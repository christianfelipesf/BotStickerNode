<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp Bot - Menu</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;display:flex;align-items:center;justify-content:center;color:#fff}
.container{text-align:center;padding:2rem;max-width:600px;width:100%}
.logo{width:120px;height:120px;margin:0 auto 1.5rem;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:3rem;box-shadow:0 8px 32px rgba(102,126,234,.3)}
h1{font-size:1.8rem;margin-bottom:.5rem;font-weight:700}
.subtitle{color:#a0a0c0;margin-bottom:2.5rem;font-size:1rem}
.cards{display:flex;flex-direction:column;gap:1rem}
.card{background:rgba(255,255,255,.08);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:1.5rem;text-decoration:none;color:#fff;transition:all .3s;cursor:pointer;display:flex;align-items:center;gap:1rem;text-align:left}
.card:hover{background:rgba(255,255,255,.15);transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,0,0,.3);border-color:rgba(255,255,255,.2)}
.card-icon{width:56px;height:56px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;flex-shrink:0}
.card-icon.dashboard{background:linear-gradient(135deg,#667eea,#764ba2)}
.card-icon.download{background:linear-gradient(135deg,#f093fb,#f5576c)}
.card-content h2{font-size:1.15rem;margin-bottom:.25rem}
.card-content p{font-size:.85rem;color:#a0a0c0}
.footer{margin-top:2.5rem;color:#666;font-size:.8rem}
.connection{display:inline-flex;align-items:center;gap:.4rem;margin-top:1rem;padding:.4rem 1rem;border-radius:20px;background:rgba(255,255,255,.05);font-size:.8rem}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.dot.green{background:#4ade80;box-shadow:0 0 6px #4ade80}
.dot.red{background:#f87171;box-shadow:0 0 6px #f87171}
</style>
</head>
<body>
<div class="container">
    <div class="logo">🤖</div>
    <h1>WhatsApp Bot</h1>
    <p class="subtitle">Escolha uma opção</p>
    <div class="cards">
        <a href="/dashboard" class="card">
            <div class="card-icon dashboard">📊</div>
            <div class="card-content">
                <h2>Dashboard</h2>
                <p>Painel de controle do bot, logs e envio de mensagens</p>
            </div>
        </a>
        <a href="/baixar" class="card">
            <div class="card-icon download">⬇️</div>
            <div class="card-content">
                <h2>Downloader de Mídia</h2>
                <p>Baixe mídias de redes sociais colando o link</p>
            </div>
        </a>
    </div>
    <div class="connection" id="status">
        <span class="dot red" id="dot"></span>
        <span id="statusText">Verificando conexão...</span>
    </div>
    <div class="footer">WhatsApp Bot &mdash; Revelar</div>
</div>
<script>
fetch('/api/connection-status').then(r=>r.json()).then(d=>{
    const dot=document.getElementById('dot');
    const txt=document.getElementById('statusText');
    if(d.status==='connected'){dot.className='dot green';txt.textContent='Conectado'}
    else{txt.textContent=d.status||'Desconectado'}
}).catch(()=>{})
</script>
</body>
</html>
