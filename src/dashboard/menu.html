<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antigravity Bot</title>
<link rel="stylesheet" href="/theme.css">
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
.container{text-align:center;padding:2rem;max-width:400px;width:100%}
.admin-link{position:fixed;top:1rem;right:1rem;width:40px;height:40px;border-radius:10px;background:var(--pn);border:1px solid var(--b);display:flex;align-items:center;justify-content:center;font-size:1.2rem;text-decoration:none;color:var(--dm);transition:all .2s;z-index:10}
.admin-link:hover{background:var(--pn2);color:var(--tx)}
.logo{width:100px;height:100px;margin:0 auto 1.5rem;border-radius:50%;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.logo img{width:100%;height:100%;object-fit:cover}
h1{font-size:1.5rem;margin-bottom:1.5rem;font-weight:700}
.cards{display:flex;flex-direction:column;gap:.75rem}
.card{background:var(--pn);border:1px solid var(--b);border-radius:14px;padding:1.25rem;display:flex;align-items:center;gap:.85rem;transition:all .2s}
.card:hover{background:var(--pn2);border-color:rgba(255,255,255,.15);transform:translateY(-1px)}
.card-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}
.card-icon.download{background:linear-gradient(135deg,#f093fb,#f5576c)}
.card-icon.dashboard{background:linear-gradient(135deg,#667eea,#764ba2)}
.card-content{text-align:left}
.card-content h2{font-size:1rem;margin-bottom:.15rem}
.card-content p{font-size:.8rem;color:var(--dm)}
.connection{display:inline-flex;align-items:center;gap:.4rem;margin-top:1.5rem;padding:.35rem .85rem;border-radius:20px;background:var(--pn);font-size:.75rem;color:var(--dm)}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot.green{background:#4ade80;box-shadow:0 0 6px #4ade80}
.dot.red{background:var(--er);box-shadow:0 0 6px var(--er)}
</style>
</head>
<body>
<a href="/admin" class="admin-link" title="Painel de Administração">⚙️</a>
<div class="container">
    <div class="logo"><img src="/media/favcon.png" alt="Antigravity Bot"></div>
    <h1>Antigravity Bot</h1>
    <div class="cards">
        <a href="/baixar" class="card">
            <div class="card-icon download">⬇️</div>
            <div class="card-content">
                <h2>Downloader de Mídia</h2>
                <p>Baixe mídias de redes sociais colando o link</p>
            </div>
        </a>
        <a href="/dashboard" class="card">
            <div class="card-icon dashboard">📊</div>
            <div class="card-content">
                <h2>Dashboard</h2>
                <p>Painel de controle do bot, logs e envio de mensagens</p>
            </div>
        </a>
    </div>
    <div class="connection" id="status">
        <span class="dot red" id="dot"></span>
        <span id="statusText">Verificando conexão...</span>
    </div>
</div>
<script>
fetch('/api/connection-status').then(r=>r.json()).then(d=>{
    const dot=document.getElementById('dot');
    const txt=document.getElementById('statusText');
    if(d.status==='connected'){dot.className='dot green';txt.textContent='Conectado'}
    else{txt.textContent=d.status||'Desconectado'}
}).catch(()=>{})
</script>
</body>
</html>
