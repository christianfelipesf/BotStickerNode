<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0e1116; color: #e6edf3; }
  header { background: #161b22; border-bottom: 1px solid #30363d; padding: 10px 18px; display: flex; align-items: center; gap: 12px; }
  header h1 { margin: 0; font-size: 16px; font-weight: 600; }
  header .spacer { flex: 1; }
  header a, header button { background: #1f2530; color: #e6edf3; border: 1px solid #30363d; border-radius: 6px; padding: 6px 12px; font-size: 12px; cursor: pointer; text-decoration: none; }
  header button:hover, header a:hover { background: #2a313c; }
  header button.danger { color: #f85149; border-color: #f85149; }

  .wrap { padding: 18px; max-width: 1100px; margin: 0 auto; }
  .login-card { max-width: 380px; margin: 60px auto; background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 24px; }
  .login-card h2 { margin: 0 0 4px; font-size: 18px; }
  .login-card p { margin: 0 0 18px; color: #9aa6b2; font-size: 13px; }
  .login-card label { display: block; font-size: 11px; color: #9aa6b2; margin: 12px 0 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .login-card input { width: 100%; background: #0e1116; border: 1px solid #30363d; border-radius: 6px; padding: 9px 11px; color: #e6edf3; font-size: 14px; }
  .login-card input:focus { outline: none; border-color: #5b8cff; }
  .login-card button.primary { width: 100%; margin-top: 16px; background: #5b8cff; color: #fff; border: none; border-radius: 6px; padding: 10px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .login-card button.primary:hover { background: #3b6fe6; }
  .login-card .err { color: #f85149; font-size: 13px; margin-top: 10px; min-height: 16px; }

  .toolbar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
  .toolbar input.search { flex: 1; min-width: 200px; background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 8px 11px; color: #e6edf3; font-size: 13px; }
  .toolbar input.search:focus { outline: none; border-color: #5b8cff; }
  .toolbar button { background: #161b22; color: #e6edf3; border: 1px solid #30363d; border-radius: 6px; padding: 8px 12px; font-size: 12px; cursor: pointer; }
  .toolbar button:hover { background: #1f2530; }
  .toolbar button.primary { background: #5b8cff; border-color: #5b8cff; color: #fff; }
  .toolbar button.primary:hover { background: #3b6fe6; }
  .toolbar button.danger { color: #f85149; border-color: #f85149; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px 14px; }
  .card:hover { border-color: #444c56; }
  .card.dirty { border-color: #d29922; }
  .card .row1 { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
  .card .name { font-family: ui-monospace, monospace; font-size: 12px; font-weight: 600; word-break: break-all; }
  .card .type { font-size: 10px; color: #6e7681; background: #1f2530; padding: 1px 6px; border-radius: 3px; text-transform: uppercase; }
  .card input[type=text], .card input[type=number] { width: 100%; background: #0e1116; border: 1px solid #30363d; border-radius: 5px; padding: 6px 9px; color: #e6edf3; font-size: 12px; font-family: ui-monospace, monospace; }
  .card input:focus { outline: none; border-color: #5b8cff; }
  .card .toggle { position: relative; width: 40px; height: 22px; background: #1f2530; border-radius: 999px; cursor: pointer; transition: background 0.2s; }
  .card .toggle.on { background: #3fb950; }
  .card .toggle::after { content: ''; position: absolute; top: 3px; left: 3px; width: 16px; height: 16px; background: #fff; border-radius: 50%; transition: left 0.2s; }
  .card .toggle.on::after { left: 21px; }
  .card .row2 { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
  .card .preview { flex: 1; font-family: ui-monospace, monospace; font-size: 11px; color: #9aa6b2; background: #0e1116; padding: 4px 8px; border-radius: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
  .card .row2 button { background: #1f2530; color: #e6edf3; border: 1px solid #30363d; border-radius: 5px; padding: 5px 9px; font-size: 11px; cursor: pointer; }
  .card .row2 button:hover { background: #2a313c; }
  .card .row2 button.save { background: #d29922; border-color: #d29922; color: #fff; }
  .card .actions-row { display: flex; gap: 6px; }
  .card textarea { width: 100%; background: #0e1116; border: 1px solid #30363d; border-radius: 5px; padding: 6px 9px; color: #e6edf3; font-size: 12px; font-family: ui-monospace, monospace; resize: vertical; min-height: 50px; }

  .toast { position: fixed; right: 18px; bottom: 18px; background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 10px 14px; font-size: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); opacity: 0; transform: translateY(8px); transition: opacity 0.2s, transform 0.2s; pointer-events: none; z-index: 100; }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.ok { border-color: #3fb950; color: #3fb950; }
  .toast.err { border-color: #f85149; color: #f85149; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 200; }
  .modal-overlay.show { display: flex; }
  .modal { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 22px; min-width: 360px; max-width: 90vw; }
  .modal h3 { margin: 0 0 14px; font-size: 15px; }
  .modal label { display: block; font-size: 11px; color: #9aa6b2; margin: 10px 0 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .modal input, .modal textarea { width: 100%; background: #0e1116; border: 1px solid #30363d; border-radius: 5px; padding: 8px 10px; color: #e6edf3; font-size: 13px; font-family: inherit; }
  .modal textarea { font-family: ui-monospace, monospace; resize: vertical; min-height: 80px; }
  .modal .row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
  .modal button { background: #1f2530; color: #e6edf3; border: 1px solid #30363d; border-radius: 5px; padding: 7px 12px; font-size: 12px; cursor: pointer; }
  .modal button.primary { background: #5b8cff; border-color: #5b8cff; color: #fff; }
  .modal .err-msg { color: #f85149; font-size: 11px; min-height: 14px; margin-top: 6px; }

  .hidden { display: none !important; }
  .empty { padding: 40px; text-align: center; color: #9aa6b2; font-size: 13px; }
  .info-line { font-size: 11px; color: #9aa6b2; margin-bottom: 12px; font-family: ui-monospace, monospace; }
</style>
</head>
<body>

<div class="login-card" id="loginCard">
  <h2>🔐 Login</h2>
  <p>Painel admin — editar config do bot.</p>
  <form id="loginForm">
    <label>Usuário</label>
    <input type="text" id="loginUser" autocomplete="username" required />
    <label>Senha</label>
    <input type="password" id="loginPass" autocomplete="current-password" required />
    <button class="primary" type="submit">Entrar</button>
    <div class="err" id="loginError"></div>
  </form>
  <p style="margin-top: 16px; font-size: 11px; color: #6e7681;">
    Senha inicial aparece nos logs: <code style="background:#0e1116;padding:1px 4px;border-radius:3px;color:#d29922">pm2 logs BotStickerNode --lines 30</code>
  </p>
</div>

<div class="hidden" id="mainApp">
  <header>
    <h1>🛠️ Admin</h1>
    <span style="font-size:11px;color:#9aa6b2" id="userPill">—</span>
    <span class="spacer"></span>
    <a href="/" id="dashLink">📊 Dashboard</a>
    <button id="btnCred">🔑 Credenciais</button>
    <button class="danger" id="btnLogout">Sair</button>
  </header>

  <div class="wrap">
    <div class="info-line" id="infoLine">—</div>
    <div class="toolbar">
      <input type="text" class="search" id="searchInput" placeholder="🔎 Filtrar..." />
      <button id="btnReload">↻</button>
      <button id="btnSaveAll" class="primary">💾 Salvar (0)</button>
      <button id="btnDiscard" class="danger">✗</button>
    </div>
    <div class="grid" id="grid"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="credModal">
  <div class="modal">
    <h3>🔑 Credenciais</h3>
    <label>Usuário atual</label>
    <input type="text" id="credCurUser" readonly />
    <label>Novo usuário</label>
    <input type="text" id="credNewUser" />
    <label>Nova senha</label>
    <input type="password" id="credNewPass" />
    <label>Confirmar</label>
    <input type="password" id="credConfirm" />
    <div class="err-msg" id="credErr"></div>
    <div class="row">
      <button id="credCancel">Cancelar</button>
      <button class="primary" id="credSave">Salvar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="editModal">
  <div class="modal" style="min-width:480px">
    <h3 id="editTitle">Editar</h3>
    <label id="editLbl">—</label>
    <textarea id="editValue" rows="6"></textarea>
    <div class="err-msg" id="editErr"></div>
    <div class="row">
      <button id="editCancel">Cancelar</button>
      <button class="primary" id="editSave">Salvar</button>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
let cfg = {}, orig = {}, dirty = new Set(), user = '', editKey = null;

function toast(msg, type='ok') {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.className = 'toast ' + type, 2200);
}

async function api(path, opts = {}) {
  const r = await fetch(path, {
    method: opts.method || 'GET',
    credentials: 'same-origin',
    headers: { 'Content-Type': 'application/json' },
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  const data = r.headers.get('content-type')?.includes('json') ? await r.json() : await r.text();
  return { ok: r.ok, status: r.status, data };
}

function eq(a, b) { return JSON.stringify(a) === JSON.stringify(b); }
function clone(v) { return JSON.parse(JSON.stringify(v)); }
function inferType(v) { if (v === null) return 'null'; if (Array.isArray(v)) return 'array'; return typeof v; }
function preview(v) {
  if (typeof v === 'boolean') return v ? '✅ ON' : '⛔ OFF';
  if (typeof v === 'string') return v.length > 30 ? v.slice(0,30)+'…' : v;
  if (typeof v === 'number') return String(v);
  if (Array.isArray(v)) return `[${v.length} itens]`;
  if (v === null) return 'null';
  if (typeof v === 'object') return '{…}';
  return String(v);
}

function renderCard(k, v) {
  const t = inferType(v);
  const card = document.createElement('div');
  card.className = 'card' + (dirty.has(k) ? ' dirty' : '');
  card.dataset.key = k;

  const r1 = document.createElement('div'); r1.className = 'row1';
  const nm = document.createElement('div'); nm.className = 'name'; nm.textContent = k;
  const tp = document.createElement('div'); tp.className = 'type'; tp.textContent = t === 'object' ? 'obj' : t;
  r1.appendChild(nm); r1.appendChild(tp);
  card.appendChild(r1);

  if (t === 'boolean') {
    const tg = document.createElement('div');
    tg.className = 'toggle' + (v ? ' on' : '');
    tg.onclick = () => { tg.classList.toggle('on'); edit(k, !current(k)); rerender(); };
    card.appendChild(tg);
  } else if (t === 'array' || t === 'object') {
    const pv = document.createElement('div'); pv.className = 'preview'; pv.textContent = preview(v); pv.title = JSON.stringify(v);
    const eb = document.createElement('button'); eb.textContent = '✏️ Editar'; eb.style.cssText = 'margin-top:8px;width:100%;background:#1f2530;color:#e6edf3;border:1px solid #30363d;border-radius:5px;padding:5px;font-size:11px;cursor:pointer';
    eb.onclick = () => openEdit(k, v, t);
    card.appendChild(pv); card.appendChild(eb);
  } else {
    const inp = document.createElement('input');
    inp.type = t === 'number' ? 'number' : 'text';
    inp.step = 'any';
    inp.value = v == null ? '' : v;
    inp.addEventListener('input', () => {
      let nv = inp.value;
      if (t === 'number') { const n = parseFloat(nv); if (isNaN(n)) { inp.style.borderColor = '#f85149'; return; } inp.style.borderColor = ''; nv = n; }
      edit(k, nv);
    });
    card.appendChild(inp);
  }

  const r2 = document.createElement('div'); r2.className = 'row2';
  if (t !== 'boolean') {
    const pv = document.createElement('div'); pv.className = 'preview'; pv.textContent = preview(v); pv.title = JSON.stringify(v);
    r2.appendChild(pv);
  } else r2.style.justifyContent = 'flex-end';
  const sb = document.createElement('button'); sb.className = 'save'; sb.textContent = '💾';
  sb.onclick = () => saveOne(k);
  r2.appendChild(sb);
  card.appendChild(r2);
  return card;
}

function current(k) { return cfg[k]; }
function edit(k, v) { if (!eq(v, orig[k])) dirty.add(k); else dirty.delete(k); cfg[k] = v; updateDirty(); }
function updateDirty() {
  document.querySelectorAll('.card').forEach(el => el.classList.toggle('dirty', dirty.has(el.dataset.key)));
  $('btnSaveAll').textContent = '💾 Salvar (' + dirty.size + ')';
}

function rerender() {
  const filter = $('searchInput').value.toLowerCase().trim();
  const items = Object.entries(cfg).filter(([k]) => !filter || k.toLowerCase().includes(filter)).sort((a,b) => a[0].localeCompare(b[0]));
  const g = $('grid');
  if (items.length === 0) { g.innerHTML = '<div class="empty">Nenhuma chave.</div>'; return; }
  g.innerHTML = '';
  for (const [k, v] of items) g.appendChild(renderCard(k, v));
  updateDirty();
}

async function load() {
  const r = await api('/api/admin/config');
  if (!r.ok) { if (r.status === 401) showLogin(); return; }
  cfg = clone(r.data.config); orig = clone(r.data.config); dirty.clear();
  $('userPill').textContent = '👤 ' + user;
  $('infoLine').textContent = `${r.data.botName || 'Bot'} • v${r.data.version || '?'} • ${r.data.platform || '?'} • restart #${r.data.restarts ?? '?'}`;
  showMain(); rerender();
}

async function saveOne(k) {
  const r = await api('/api/admin/config', { method: 'PUT', body: { updates: { [k]: cfg[k] } } });
  if (!r.ok) { toast('Erro ao salvar', 'err'); return; }
  orig[k] = clone(cfg[k]); dirty.delete(k); updateDirty(); toast(k + ' salvo ✓', 'ok');
}

async function saveAll() {
  if (dirty.size === 0) return;
  const updates = {}; for (const k of dirty) updates[k] = cfg[k];
  const r = await api('/api/admin/config', { method: 'PUT', body: { updates } });
  if (!r.ok) { toast('Erro', 'err'); return; }
  for (const k of dirty) orig[k] = clone(cfg[k]);
  dirty.clear(); updateDirty(); toast(Object.keys(updates).length + ' salvas ✓', 'ok');
}

function showLogin() { $('loginCard').classList.remove('hidden'); $('mainApp').classList.add('hidden'); }
function showMain() { $('loginCard').classList.add('hidden'); $('mainApp').classList.remove('hidden'); }

$('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const u = $('loginUser').value.trim(), p = $('loginPass').value;
  const r = await api('/api/admin/login', { method: 'POST', body: { username: u, password: p } });
  if (!r.ok) { $('loginError').textContent = r.data?.error || 'Erro'; return; }
  user = u; await load();
});

$('btnLogout').addEventListener('click', async () => {
  await api('/api/admin/logout', { method: 'POST' });
  user = ''; $('userPill').textContent = '—'; showLogin(); $('loginUser').value = ''; $('loginPass').value = '';
});
$('btnReload').addEventListener('click', load);
$('btnSaveAll').addEventListener('click', saveAll);
$('btnDiscard').addEventListener('click', () => { cfg = clone(orig); dirty.clear(); rerender(); toast('Descartado'); });
$('searchInput').addEventListener('input', rerender);

$('btnCred').addEventListener('click', () => {
  $('credCurUser').value = user;
  $('credNewUser').value = user; $('credNewPass').value = ''; $('credConfirm').value = ''; $('credErr').textContent = '';
  $('credModal').classList.add('show');
});
$('credCancel').addEventListener('click', () => $('credModal').classList.remove('show'));
$('credSave').addEventListener('click', async () => {
  const u = $('credNewUser').value.trim(), p = $('credNewPass').value, c = $('credConfirm').value;
  if (p !== c) { $('credErr').textContent = 'Senhas não conferem'; return; }
  const r = await api('/api/admin/credentials', { method: 'POST', body: { username: u, password: p } });
  if (!r.ok) { $('credErr').textContent = r.data?.error || 'Erro'; return; }
  toast('Atualizado ✓', 'ok'); $('credModal').classList.remove('show'); user = u; $('userPill').textContent = '👤 ' + u;
});

function openEdit(k, v, t) {
  editKey = k; $('editTitle').textContent = 'Editar ' + k;
  $('editLbl').textContent = `Tipo: ${t}. Use JSON válido.`;
  $('editValue').value = (t === 'array' || t === 'object') ? JSON.stringify(v, null, 2) : String(v);
  $('editErr').textContent = ''; $('editModal').classList.add('show');
  setTimeout(() => $('editValue').focus(), 50);
}
$('editCancel').addEventListener('click', () => { $('editModal').classList.remove('show'); editKey = null; });
$('editSave').addEventListener('click', () => {
  if (!editKey) return;
  const t = inferType(cfg[editKey]);
  try {
    let v = (t === 'array' || t === 'object') ? JSON.parse($('editValue').value)
      : t === 'number' ? parseFloat($('editValue').value)
      : $('editValue').value;
    cfg[editKey] = v; edit(editKey, v);
    $('editModal').classList.remove('show'); editKey = null; rerender(); toast('Editado — clique 💾', 'ok');
  } catch (e) { $('editErr').textContent = 'JSON inválido: ' + e.message; }
});

load();
</script>
</body>
</html>
