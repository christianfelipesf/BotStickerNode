<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>{{BOT_NAME}}</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0b141a">
    <link rel="icon" type="image/jpeg" href="/favicon.ico">
    <link rel="stylesheet" href="/dashboard.css">
</head>
<body>
    <aside id="sidebar">
        <header class="sb-header">
            <img src="https://ui-avatars.com/api/?name={{BOT_NAME_ENCODED}}&background=128c7e&color=fff&size=64" alt="">
            <div class="sb-title">{{BOT_NAME}}</div>
            <div class="sb-status" id="status">conectando…</div>
        </header>
        <div class="sb-actions">
            <input id="groupSearch" type="search" placeholder="🔎 Buscar grupo" autocomplete="off">
            <div class="sb-buttons">
                <button id="push-btn" class="sb-btn" onclick="togglePush()">PUSH</button>
                <button id="notif-btn" class="sb-btn" onclick="toggleSound()">SOM</button>
                <button class="sb-btn" onclick="setTheme('light')" title="Claro">☀</button>
                <button class="sb-btn" onclick="setTheme('dark')" title="Escuro">🌙</button>
                <button class="sb-btn" onclick="setTheme('oled')" title="OLED">⬛</button>
                <button id="info-btn" class="sb-btn" onclick="openInfo()" title="Abrir info.txt">📋</button>
            </div>
        </div>
        <ul id="groupList" class="group-list">
            <li class="empty">Nenhum grupo com dashboard ativa ainda.<br><small>Use <code>!dashboard</code> em um grupo para ativá-lo.</small></li>
        </ul>
    </aside>
    <main id="main">
        <header id="chatHeader">
            <div class="ch-left">
                <button class="ch-back" id="backBtn" title="Voltar">‹</button>
                <div class="ch-avatar" id="chatAvatar">?</div>
                <div class="ch-info">
                    <div class="ch-name" id="chatName">Selecione um grupo</div>
                    <div class="ch-sub" id="chatSub">—</div>
                </div>
            </div>
        </header>
        <div id="chat"></div>
        <div id="composer">
            <div class="reply-bar" id="replyBar">
                <div class="rb-info">
                    <div class="rb-name" id="replyName"></div>
                    <div class="rb-text" id="replyText"></div>
                </div>
                <button class="rb-close" onclick="clearReply()">✕</button>
            </div>
            <div class="attachments" id="attachments"></div>
            <div class="input-row">
                <button class="icon-btn" id="attachBtn" title="Anexar mídia">＋</button>
                <input type="file" id="fileInput" multiple style="display:none" accept="image/*,video/*,audio/*,application/*">
                <div class="input-wrap">
                    <textarea id="messageInput" placeholder="Mensagem" rows="1" disabled></textarea>
                </div>
                <button class="send-btn" id="sendBtn" onclick="sendCurrent()" disabled>➤</button>
            </div>
        </div>
    </main>
    <div class="toast" id="toast"></div>
    <div class="info-overlay" id="infoOverlay" aria-hidden="true">
        <div class="info-modal" role="dialog" aria-modal="true" aria-labelledby="infoTitle">
            <header class="info-header">
                <div class="info-title" id="infoTitle">📋 info.txt</div>
                <div class="info-actions">
                    <button class="info-icon" onclick="reloadInfo()" title="Recarregar do disco">↻</button>
                    <button class="info-icon" onclick="closeInfo()" title="Fechar">✕</button>
                </div>
            </header>
            <div class="info-meta" id="infoMeta">carregando…</div>
            <pre class="info-body" id="infoBody">carregando…</pre>
        </div>
    </div>
    <audio id="sound-chat" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>
    <audio id="sound-action" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>
    <audio id="sound-error" src="https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3" preload="auto"></audio>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/dashboard-client.js"></script>
</body>
</html>
